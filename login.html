<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover">
    <title>Sign In · DentCraft | PDR Expert Dashboard</title>
    <!-- Custom Favicon - DentCraft -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%23E0A82B' d='M464 128H336v-32c0-17.6-14.4-32-32-32h-96c-17.6 0-32 14.4-32 32v32H48c-26.5 0-48 21.5-48 48v224c0 26.5 21.5 48 48 48h416c26.5 0 48-21.5 48-48V176c0-26.5-21.5-48-48-48zM288 400h-64v-48c0-8.8 7.2-16 16-16s16 7.2 16 16v48zm80-240v32H144v-32h224z'/%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="tailwind.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'dent-gold': '#E0A82B',
                        'dent-gold-dark': '#C48A1D',
                        'dent-gold-bright': '#F5BC3C',
                        'dent-charcoal': '#1E2A32',
                        'dent-slate': '#2E3B44',
                        'dent-light': '#F8F6F2',
                        'dent-card': '#FFFFFF',
                        'dark-bg': '#12181C',
                        'dark-card': '#1E2A2F',
                        'dark-surface': '#2A3A42',
                    },
                    fontFamily: {
                        'display': ['Outfit', 'system-ui', 'sans-serif'],
                        'body': ['Roboto', 'system-ui', 'sans-serif'],
                        'alt': ['Poppins', 'sans-serif'],
                    },
                    backgroundImage: {
                        'dent-pattern': "radial-gradient(circle at 20% 30%, rgba(224,168,43,0.04) 0%, transparent 60%)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'float': 'float 6s ease-in-out infinite',
                        'spin-slow': 'spinSlow 12s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-6px)' } },
                        spinSlow: { '0%': { transform: 'rotate(0deg)' }, '100%': { transform: 'rotate(360deg)' } },
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Roboto:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* NO SCROLL — fit exactly one screen */
        html,
        body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F8F6F2;
            color: #1E2A32;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .dark body {
            background-color: #12181C;
            color: #E8EDEE;
        }

        /* toggle buttons — positioned top-right */
        .theme-toggle-wrapper {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            gap: 6px;
        }

        .toggle-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #1E2A32;
            transition: all 0.2s ease;
            border: 1px solid rgba(224,168,43,0.3);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .dark .toggle-btn {
            background: #1E2A2F;
            color: #E0A82B;
            border-color: rgba(224,168,43,0.4);
        }

        .toggle-btn:hover {
            background: #E0A82B;
            color: #1E2A32;
        }

        .dark .toggle-btn:hover {
            background: #E0A82B;
            color: #12181C;
        }

        .toggle-btn.active {
            background: #E0A82B;
            color: #1E2A32;
        }

        /* LOGIN CARD */
        .login-card {
            background: white;
            border-radius: 36px;
            padding: 2.2rem 2rem 2rem;
            box-shadow: 0 20px 45px rgba(30,42,50,0.12);
            border: 1px solid rgba(224,168,43,0.25);
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }

        .dark .login-card {
            background: #1E2A2F;
            border-color: #3A4A52;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* input styling */
        .login-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border-radius: 50px;
            border: 1px solid #CFD5DB;
            background: white;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: #1E2A32;
            font-family: 'Roboto', sans-serif;
        }

        .dark .login-input {
            background: #2A3A42;
            border-color: #4A5A62;
            color: #E8EDEE;
        }

        .login-input:focus {
            outline: none;
            border-color: #E0A82B;
            box-shadow: 0 0 0 3px rgba(224,168,43,0.25);
        }

        .dark .login-input:focus {
            border-color: #F5BC3C;
            box-shadow: 0 0 0 3px rgba(245,188,60,0.25);
        }

        /* password wrapper */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper .login-input {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #E0A82B;
            font-size: 1rem;
            transition: color 0.2s;
            background: transparent;
            border: none;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark .toggle-password {
            color: #F5BC3C;
        }

        .toggle-password:hover {
            color: #C48A1D;
        }

        [dir="rtl"] .toggle-password {
            right: auto;
            left: 1rem;
        }

        [dir="rtl"] .password-wrapper .login-input {
            padding-right: 1.2rem;
            padding-left: 3rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        /* primary button */
        .dent-btn {
            background: #E0A82B;
            color: #1E2A32;
            font-weight: 700;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .dent-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(224,168,43,0.4);
            background: #C48A1D;
        }

        .dark .dent-btn {
            background: #F5BC3C;
            color: #12181C;
        }

        .dark .dent-btn:hover {
            background: #E0A82B;
        }

        /* social login buttons */
        .social-btn-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .social-btn {
            flex: 1;
            padding: 0.8rem 0.5rem;
            border-radius: 50px;
            border: 1px solid #CFD5DB;
            background: white;
            color: #1E2A32;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }

        .dark .social-btn {
            background: #2A3A42;
            border-color: #4A5A62;
            color: #E8EDEE;
        }

        .social-btn:hover {
            background: rgba(224,168,43,0.1);
            border-color: #E0A82B;
            transform: translateY(-2px);
        }

        .dark .social-btn:hover {
            background: rgba(245,188,60,0.15);
            border-color: #F5BC3C;
        }

        .social-btn i {
            font-size: 1.1rem;
            color: #E0A82B;
        }

        .dark .social-btn i {
            color: #F5BC3C;
        }

        /* logo container */
        .logo-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .brand-logo {
            background: #E0A82B;
            width: 36px;
            height: 36px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0;
            box-shadow: 0 4px 10px rgba(224,168,43,0.3);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .brand-logo {
                width: 40px;
                height: 40px;
            }
        }

        .brand-logo i {
            color: #1E2A32;
        }

        .dark .brand-logo i {
            color: #12181C;
        }

        .welcome-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1E2A32;
            margin-top: 0.5rem;
            margin-bottom: 0.25rem;
            text-align: center;
            line-height: 1.2;
        }

        .dark .welcome-title {
            color: #E8EDEE;
        }

        .welcome-subtitle {
            font-size: 0.9rem;
            color: #64748B;
            text-align: center;
            margin-bottom: 0.5rem;
            font-family: 'Roboto', sans-serif;
        }

        .dark .welcome-subtitle {
            color: #94A3B8;
        }

        /* RTL adjustments */
        [dir="rtl"] .login-input {
            padding: 0.85rem 3rem 0.85rem 1.2rem;
        }

        [dir="rtl"] .input-icon {
            left: auto;
            right: 1.1rem;
        }

        [dir="rtl"] .fa-arrow-right {
            transform: scaleX(-1);
        }

        [dir="rtl"] .theme-toggle-wrapper {
            right: auto;
            left: 20px;
        }

        /* Fix for short screens */
        @media (max-height: 650px) {
            .login-card {
                padding: 0.8rem 1.5rem;
                transform: scale(0.95);
                transform-origin: center;
            }

            .logo-center {
                margin-bottom: 0.5rem;
            }

            .welcome-title {
                font-size: 1.3rem;
                margin-top: 0;
            }

            .welcome-subtitle {
                font-size: 0.8rem;
                margin-bottom: 0.5rem;
            }

            .login-input {
                padding: 0.6rem 0.8rem 0.6rem 2.5rem;
                font-size: 0.85rem;
            }

            .dent-btn {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
                margin-top: 0.25rem;
            }

            .theme-toggle-wrapper {
                top: 8px;
                right: 8px;
            }

            .toggle-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 1.5rem 1.2rem;
                border-radius: 24px;
            }

            .logo-center {
                margin-bottom: 1rem;
            }

            .welcome-title {
                font-size: 1.3rem;
            }

            .login-input {
                padding: 0.7rem 1rem 0.7rem 2.8rem;
                font-size: 0.85rem;
            }

            .dent-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .theme-toggle-wrapper {
                top: 12px;
                right: 12px;
            }

            [dir="rtl"] .theme-toggle-wrapper {
                left: 12px;
            }
        }

        .hidden {
            display: none;
        }

        .container-tight {
            max-width: 480px;
            width: 100%;
            padding: 0 1.2rem;
        }

        .text-dent-gold {
            color: #E0A82B;
        }

        a {
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="dent-pattern">

    <!-- ===== THEME TOGGLES - TOP-RIGHT ===== -->
    <div class="theme-toggle-wrapper">
        <button id="theme-toggle" class="toggle-btn" title="Dark / Light">
            <i class="fas fa-moon"></i>
        </button>
        <button id="rtl-toggle" class="toggle-btn" title="RTL / LTR">
            ⇄
        </button>
    </div>

    <!-- ===== LOGIN CARD ===== -->
    <div class="container-tight">
        <div class="login-card animate-fade-in">

            <!-- ===== LOGO - CENTERED ===== -->
            <div class="logo-center mb-8">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div dir="ltr" class="flex">
                        <span
                            class="text-2xl font-display font-bold tracking-tight text-dent-charcoal dark:text-white">DENT</span>
                        <span
                            class="text-2xl font-display font-bold tracking-tight text-dent-gold dark:text-dent-gold-bright">CRAFT</span>
                    </div>
                </a>

                <h1 class="welcome-title mt-4">Welcome Back</h1>
                <p class="welcome-subtitle">Sign in to track your repairs & manage PDR claims</p>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <form id="loginForm" class="space-y-5" action="#" method="GET">

                <!-- email field -->
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-dent-gold input-icon">
                        <i class="fas fa-envelope w-5 text-sm"></i>
                    </span>
                    <input type="email" name="email" id="login-email" placeholder="Email address" required
                        class="login-input text-sm md:text-base">
                </div>

                <!-- password field with eye icon -->
                <div class="password-wrapper">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-dent-gold input-icon">
                        <i class="fas fa-lock w-5 text-sm"></i>
                    </span>
                    <input type="password" id="login-password" name="password" placeholder="Password" required
                        class="login-input text-sm md:text-base">
                    <button type="button" class="toggle-password" data-target="login-password"
                        aria-label="Show password">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>

                <!-- remember + forgot -->
                <div class="flex items-center justify-between text-xs md:text-sm">
                    <label class="flex items-center space-x-2 rtl:space-x-reverse cursor-pointer text-dent-slate dark:text-gray-300">
                        <input type="checkbox"
                            class="rounded border-gray-300 dark:border-gray-600 text-dent-gold focus:ring-dent-gold/30 dark:bg-gray-700"
                            checked>
                        <span class="ml-1 rtl:mr-1">Remember me</span>
                    </label>
                    <a href="#" id="forgotPasswordLink"
                        class="text-dent-gold dark:text-dent-gold-bright hover:text-dent-gold-dark font-medium transition hover:underline">
                        Forgot password?
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="dent-btn mt-3">
                    Sign In
                </button>

                <!-- divider -->
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                    </div>
                    <div class="relative justify-center flex text-xs">
                        <span class="bg-white dark:bg-[#1E2A2F] px-4 py-0.5 text-dent-slate dark:text-gray-400 rounded-full">
                            or continue with
                        </span>
                    </div>
                </div>

            </form>

            <!-- ===== SOCIAL LOGIN BUTTONS ===== -->
            <div class="mt-6">
                <div class="grid grid-cols-2 gap-3">
                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"
                        onclick="socialLogin('google')">
                        <i class="fab fa-google text-base"></i>
                        <span>Google</span>
                    </button>
                    <button class="social-btn group w-full flex items-center justify-center gap-2 py-3 px-2 text-sm"
                        onclick="socialLogin('apple')">
                        <i class="fab fa-apple text-base"></i>
                        <span>Apple</span>
                    </button>
                </div>
            </div>

            <!-- ===== "NOT A MEMBER? SIGN UP" LINK ===== -->
            <div class="text-center mt-6 pt-4 border-t border-dashed border-gray-200 dark:border-gray-700/40">
                <a href="signup.html"
                    class="inline-flex items-center text-dent-gold dark:text-dent-gold-bright font-semibold hover:text-dent-gold-dark transition group text-sm md:text-base gap-2">
                    <span>New to DentCraft? Sign up</span>
                </a>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script>
            (function () {
                // ---------- THEME TOGGLE ----------
                const themeToggle = document.getElementById('theme-toggle');

                function setTheme(isDark) {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }

                    const icon = themeToggle?.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-sun', 'fa-moon');
                        icon.classList.add(isDark ? 'fa-moon' : 'fa-sun');
                    }

                    if (isDark) {
                        themeToggle?.classList.add('active');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        themeToggle?.classList.remove('active');
                        localStorage.setItem('theme', 'light');
                    }
                }

                // Check for saved theme or system preference
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setTheme(true);
                } else if (savedTheme === 'light') {
                    setTheme(false);
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setTheme(true);
                } else {
                    setTheme(false);
                }

                if (themeToggle) {
                    themeToggle.addEventListener('click', (e) => {
                        e.preventDefault();
                        setTheme(!document.documentElement.classList.contains('dark'));
                    });
                }

                // ---------- RTL TOGGLE ----------
                const rtlBtn = document.getElementById('rtl-toggle');

                function setRTL(isRTL) {
                    if (isRTL) {
                        document.documentElement.dir = 'rtl';
                        document.documentElement.lang = 'ar';
                        rtlBtn?.classList.add('active');
                        localStorage.setItem('dir', 'rtl');
                    } else {
                        document.documentElement.dir = 'ltr';
                        document.documentElement.lang = 'en';
                        rtlBtn?.classList.remove('active');
                        localStorage.setItem('dir', 'ltr');
                    }
                }
                const savedDir = localStorage.getItem('dir');
                savedDir === 'rtl' ? setRTL(true) : setRTL(false);

                if (rtlBtn) {
                    rtlBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        setRTL(document.documentElement.dir !== 'rtl');
                    });
                }

                // ---------- EYE ICON TOGGLE PASSWORD VISIBILITY ----------
                const toggleButtons = document.querySelectorAll('.toggle-password');
                toggleButtons.forEach(button => {
                    button.addEventListener('click', function (e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('data-target');
                        const passwordInput = document.getElementById(targetId);
                        if (passwordInput) {
                            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                            passwordInput.setAttribute('type', type);
                            const icon = this.querySelector('i');
                            if (icon) {
                                if (type === 'text') {
                                    icon.classList.remove('fa-eye-slash');
                                    icon.classList.add('fa-eye');
                                } else {
                                    icon.classList.remove('fa-eye');
                                    icon.classList.add('fa-eye-slash');
                                }
                            }
                        }
                    });
                });

                // ---------- FORGOT PASSWORD HANDLER ----------
                const forgotLink = document.getElementById('forgotPasswordLink');
                if (forgotLink) {
                    forgotLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('🔐 Password reset link will be sent to your email. Check your inbox!');
                    });
                }

                // ---------- LOGIN FORM SUBMIT ----------
                const loginForm = document.getElementById('loginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => {
                        e.preventDefault();

                        const email = document.getElementById('login-email')?.value;
                        const password = document.getElementById('login-password')?.value;

                        if (!email || !password) {
                            alert('Please enter both email and password');
                            return;
                        }

                        // Redirect to dashboard after successful login
                        window.location.href = 'index.html';
                    });
                }

                // ---------- SOCIAL LOGIN HANDLER ----------
                window.socialLogin = function (provider) {
                    alert(`🔐 ${provider.charAt(0).toUpperCase() + provider.slice(1)} login would be implemented here.\n\n✨ Welcome to DentCraft — track your PDR repairs instantly!`);
                };
            })();
    </script>
</body>
